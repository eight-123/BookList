<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Shelf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>📚 My Shelf</h1>

  <div class="controls">

    <input id="titleInput" placeholder="本のタイトル">

    <input id="authorInput" placeholder="作者（任意）">

    <select id="genreInput">
      <option>SF</option>
      <option>ミステリー</option>
      <option>歴史</option>
      <option>哲学</option>
      <option>漫画</option>
      <option>ホラー</option>
      <option>その他</option>
    </select>

    <select id="statusInput">
      <option>欲しい</option>
      <option>読んでる</option>
      <option>読了</option>
    </select>

    <button id="addBtn">追加</button>

    <select id="sortSelect">
      <option value="default">登録順</option>
      <option value="title">タイトル順</option>
      <option value="genre">ジャンル順</option>
    </select>

  </div>

  <div class="filters">

    <input
      id="titleFilter"
      placeholder="タイトル検索">

    <input
      id="authorFilter"
      placeholder="作者検索">

    <select id="genreFilter">

      <option value="">全ジャンル</option>

      <option>SF</option>
      <option>ミステリー</option>
      <option>歴史</option>
      <option>哲学</option>
      <option>漫画</option>
      <option>ホラー</option>
      <option>その他</option>

    </select>

  </div>


  <h2>欲しい</h2>
  <div id="wantShelf" class="shelf"></div>

  <h2>読んでる</h2>
  <div id="readingShelf" class="shelf"></div>

  <h2>読了</h2>
  <div id="doneShelf" class="shelf"></div>


  <!-- モーダル -->
  <div id="modal" class="modal hidden">

    <div class="modalContent">

      <h2 id="modalTitle"></h2>

      <label>作者</label>

        <input
        id="authorEdit"
        placeholder="作者名">

      <p id="modalGenre"></p>

      <select id="editStatus">
        <option value="欲しい">欲しい</option>
        <option value="読んでる">読んでる</option>
        <option value="読了">読了</option>
      </select>

      <textarea
        id="memoInput"
        placeholder="メモを書く">
      </textarea>

      <div class="modalButtons">

        <button id="saveMemo">
          保存
        </button>

        <button id="deleteBook">
          削除
        </button>

        <button id="closeModal">
          閉じる
        </button>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
